<svg width="100%" viewBox="185 88 310 168" xmlns="http://www.w3.org/2000/svg">
  <defs>
    
    <linearGradient id="pos-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#1D9E75" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#5DCAA5"/>
    </linearGradient>
    <linearGradient id="neg-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#D85A30" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#F0997B"/>
    </linearGradient>
    <linearGradient id="neu-grad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#888780" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#B4B2A9"/>
    </linearGradient>
    <linearGradient id="arc-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#D85A30"/>
      <stop offset="50%" stop-color="#888780"/>
      <stop offset="100%" stop-color="#1D9E75"/>
    </linearGradient>
  </defs>

  <!-- ── Icon: bar chart + sentiment arc ── -->
  <!-- Bar chart base bars -->
  <!-- Negative bar -->
  <rect x="194" y="188" width="22" height="56" rx="4" fill="url(#neg-grad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Neutral bar -->
  <rect x="224" y="162" width="22" height="82" rx="4" fill="url(#neu-grad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Positive bar (tallest) -->
  <rect x="254" y="124" width="22" height="120" rx="4" fill="url(#pos-grad)" style="stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Baseline -->
  <line x1="185" y1="248" x2="286" y2="248" stroke="var(--color-border-secondary)" stroke-width="1.5" stroke-linecap="round" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.3);color:rgb(0, 0, 0);stroke-width:1.5px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Sentiment arc above bars -->
  <!-- Arc from negative to positive (sweeps over bars) -->
  <path d="M 195 152 Q 235 92 275 152" fill="none" stroke="url(#arc-grad)" stroke-width="3" stroke-linecap="round" style="fill:none;color:rgb(0, 0, 0);stroke-width:3px;stroke-linecap:round;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- Needle / pointer dot at positive end -->
  <circle cx="275" cy="152" r="5" fill="#1D9E75" style="fill:rgb(29, 158, 117);stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
  <!-- Small pulse ring -->
  <circle cx="275" cy="152" r="9" fill="none" stroke="#1D9E75" stroke-width="1.2" opacity="0.4" style="fill:none;stroke:rgb(29, 158, 117);color:rgb(0, 0, 0);stroke-width:1.2px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.4;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

  <!-- ── Wordmark ── -->
  <text x="300" y="188" font-size="46" fill="#FFFFFF" style="fill:#FFFFFF;stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:Syne, sans-serif;font-size:46px;font-weight:700;text-anchor:start;dominant-baseline:auto">Sentio</text>
  <text x="302" y="216" font-size="11" fill="#AAAAAA" style="fill:#AAAAAA;stroke:none;color:rgb(0, 0, 0);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;DM Sans&quot;, sans-serif;font-size:11px;font-weight:400;text-anchor:start;dominant-baseline:auto">SENTIMENT DASHBOARD</text>

  <!-- Thin accent line under wordmark -->
  <line x1="302" y1="224" x2="492" y2="224" stroke="var(--color-border-tertiary)" stroke-width="0.8" style="fill:rgb(0, 0, 0);stroke:rgba(31, 30, 29, 0.15);color:rgb(0, 0, 0);stroke-width:0.8px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>
</svg>